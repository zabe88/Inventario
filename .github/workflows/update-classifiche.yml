name: Update classifiche
on:
  schedule:
    - cron: '17 5,13 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-api-python-client
      - name: Build classifiche
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python scripts/update_classifiche.py \
            --supabase-url "$SUPABASE_URL" \
            --supabase-key "$SUPABASE_KEY" \
            --youtube-key "$YOUTUBE_API_KEY" \
            --output classifiche.json
      - name: Commit updated feed
        run: |
          git config user.name "Cervellone Bot"
          git config user.email "bot@cervellone.local"
          git add classifiche.json || true
          git diff --staged --quiet || git commit -m "auto: classifiche $(date +%Y-%m-%d)" && git push || true
