name: Update covers

on:
  workflow_dispatch:
  schedule:
    - cron: '41 4,12 * * *'

permissions:
  contents: write

concurrency:
  group: update-covers
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-classifiche.txt

      - name: Build covers.json
        run: |
          python scripts/update_covers.py --output covers.json --max-new 350

      - name: Commit updated covers feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- covers.json; then
            echo "No changes"
            exit 0
          fi
          git add covers.json
          git commit -m "chore: update covers feed"
          git push
