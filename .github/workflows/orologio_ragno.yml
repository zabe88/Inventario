name: 🕷️ Risveglio Notturno degli Sciami

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: 

jobs:
  scansiona_mondo:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }} # <-- LA SERRATURA CORRETTA

    steps:
    - name: 📥 Scarica i file dal tuo repository
      uses: actions/checkout@v4

    - name: 🐍 Prepara l'ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🛠️ Installa le armi dei Ragni
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-classifiche.txt

    - name: 🗣️ Scatena il Radar Passaparola (Reddit)
      run: python ragno_reddit.py
      continue-on-error: true

    - name: 📱 Scatena il Radar BookTok (TikTok/Google)
      run: python ragno_booktok.py
      continue-on-error: true

    - name: ⭐ Scatena l'Oracolo (Uscite Star Comics)
      run: python ragno_star.py
      continue-on-error: true

    - name: 🦸‍♂️ Scatena l'Oracolo (Uscite Panini)
      run: python ragno_panini.py
      continue-on-error: true

    - name: 📚 Scatena l'Oracolo (Uscite Giunti)
      run: python ragno_giunti.py
      continue-on-error: true

    - name: 🌸 Scatena l'Oracolo (Uscite J-Pop)
      run: python ragno_jpop.py
      continue-on-error: true

    - name: 🦅 Scatena l'Oracolo (Uscite Mondadori/Vault)
      run: python ragno_mondadori.py
      continue-on-error: true

    - name: 🧙‍♂️ Scatena L'Archivista (Recupero Copertine)
      run: python ragno_archivista.py
      continue-on-error: true
