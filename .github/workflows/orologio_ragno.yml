name: 🕷️ Risveglio Notturno del Ragno Lunigiana

on:
  schedule:
    # Esegue ogni notte alle 03:00 UTC (che sono le 04:00 o 05:00 in Italia)
    - cron: '0 3 * * *'
  workflow_dispatch: # Questo ti permette di avviarlo anche a mano con un click se vuoi testarlo

jobs:
  scansiona_territorio:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Scarica i file dal tuo repository
      uses: actions/checkout@v3

    - name: 🐍 Prepara l'ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🛠️ Installa le armi del Ragno
      run: |
        python -m pip install --upgrade pip
        pip install supabase requests beautifulsoup4

    - name: 🚀 Scatena lo Sciame sulla Lunigiana
      run: python ragno_lunigiana.py
