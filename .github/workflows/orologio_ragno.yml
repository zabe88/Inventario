name: 🕷️ Risveglio Notturno degli Sciami

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: 

jobs:
  scansiona_mondo:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Scarica i file dal tuo repository
      uses: actions/checkout@v3

    - name: 🐍 Prepara l'ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🛠️ Installa le armi dei Ragni
      run: |
        python -m pip install --upgrade pip
        pip install supabase requests beautifulsoup4 lxml

    - name: 🚀 Scatena lo Sciame Lunigiana (Eventi Locali)
      run: python ragno_lunigiana.py

    - name: 🌋 Scatena il Sismografo (Trend Anime Nazionali)
      run: python ragno_anime.py

    - name: 🗣️ Scatena il Radar Passaparola (Reddit)
      run: python ragno_reddit.py

    - name: 📱 Scatena il Radar BookTok (TikTok/Google)
      run: python ragno_booktok.py

    - name: ⭐ Scatena l'Oracolo (Uscite Star Comics)
      run: python ragno_star.py
