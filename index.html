<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cervellone God Mode - Libreria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: #1a1a1a; }
        
        /* La barra di ricerca del lettore di codici a barre */
        .scanner-input {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            border: 3px solid #007aff;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .scanner-input:focus { outline: none; box-shadow: 0 0 15px rgba(0, 122, 255, 0.4); }

        /* I box di intelligenza artificiale */
        .intelligence-panel { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .alert-box {
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            display: none; /* Nascosti di default */
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Colori specifici per ogni ragno */
        .alert-hype { background: #ffebee; color: #c62828; border-left: 8px solid #c62828; } /* Anime e BookTok */
        .alert-release { background: #e3f2fd; color: #1565c0; border-left: 8px solid #1565c0; } /* Uscite Editori */
        .alert-local { background: #e8f5e9; color: #2e7d32; border-left: 8px solid #2e7d32; } /* Lunigiana */
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .loader { text-align: center; font-style: italic; color: #666; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 God Mode: Attivo</h1>
    
    <input type="text" id="scanner" class="scanner-input" placeholder="Spara un codice a barre o scrivi un titolo..." autofocus>
    
    <div id="loading" class="loader">Interrogazione dei 9 Sciami in corso...</div>

    <div id="intelligence-results" class="intelligence-panel"></div>
</div>

<script>
    // --- LE TUE CHIAVI SEGRETE ---
    const SUPABASE_URL = 'https://aacqebirvnkrbewvgmvo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_opJ7oXwCxaT53ym88mSxOA_-iNxA1f3';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const inputScanner = document.getElementById('scanner');
    const loadingDiv = document.getElementById('loading');
    const resultsDiv = document.getElementById('intelligence-results');

    // Il lettore di codici a barre simula la pressione del tasto "Invio"
    inputScanner.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            let query = inputScanner.value.trim();
            if (query !== "") {
                eseguiScansioneGodMode(query);
            }
        }
    });

    async function eseguiScansioneGodMode(testoScansionato) {
        // Pulisce lo schermo per la nuova ricerca
        resultsDiv.innerHTML = '';
        loadingDiv.style.display = 'block';

        // Estrapoliamo la prima parola chiave forte dal titolo per fare la ricerca incrociata
        // (Se è un codice a barre, nella tua app reale prima lo convertiresti in Titolo. 
        // Per ora facciamo finta che scrivi il titolo o una parola chiave del manga)
        let parolaChiave = testoScansionato.split(" ")[0]; 

        try {
            // L'ATTACCO AL DATABASE: Cerchiamo cosa sanno i ragni su questa parola chiave
            const { data, error } = await supabase
                .from('external_signal_staging')
                .select('*')
                .ilike('signal_text', `%${parolaChiave}%`)
                .limit(5);

            loadingDiv.style.display = 'none';

            if (error) throw error;

            if (data && data.length > 0) {
                // Se i ragni hanno trovato qualcosa, accendiamo gli allarmi!
                data.forEach(segnale => {
                    let tipoAllarme = 'alert-local'; // Default
                    
                    // Capiamo chi ha mandato il segnale per colorare il box
                    if (segnale.signal_type === 'national_trend') tipoAllarme = 'alert-hype';
                    if (segnale.signal_type === 'publisher_release') tipoAllarme = 'alert-release';

                    // Creiamo il box esplosivo a schermo
                    let box = document.createElement('div');
                    box.className = `alert-box ${tipoAllarme}`;
                    box.style.display = 'block';
                    box.innerHTML = segnale.signal_text;
                    resultsDiv.appendChild(box);
                });
            } else {
                // Se i ragni tacciono
                let boxVuoto = document.createElement('div');
                boxVuoto.style.padding = '10px';
                boxVuoto.style.color = '#888';
                boxVuoto.innerHTML = "Nessun segnale intercettato dai ragni per questo titolo. Tutto tranquillo.";
                resultsDiv.appendChild(boxVuoto);
            }

        } catch (error) {
            console.error('Errore di connessione al Cervellone:', error);
            loadingDiv.style.display = 'none';
        }
        
        // Svuota la barra per sparare al prossimo libro
        inputScanner.value = '';
    }
</script>

</body>
</html>
